<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Ramadan Study Progress Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white border border-slate-200 rounded-xl p-6">
    <h1 class="text-2xl font-semibold mb-2">Login</h1>
    <p class="text-sm text-slate-600 mb-6">Sign in to manage your study progress.</p>

    <form id="loginForm" class="space-y-4">
      <label class="block">
        <span class="text-sm font-medium">Email</span>
        <input id="email" type="email" required class="mt-1 w-full rounded-md border-slate-300 focus:border-slate-500 focus:ring-slate-500" />
      </label>

      <label class="block">
        <span class="text-sm font-medium">Password</span>
        <input id="password" type="password" required class="mt-1 w-full rounded-md border-slate-300 focus:border-slate-500 focus:ring-slate-500" />
      </label>

      <button type="submit" class="w-full px-4 py-2 rounded-md bg-slate-800 text-white font-medium hover:bg-slate-700">Login</button>
      <p id="authMessage" class="text-sm"></p>
    </form>

    <p class="mt-4 text-sm">No account? <a class="text-emerald-600 hover:text-emerald-500" href="./signup.html">Sign up</a></p>
  </div>

  <script type="module" src="./js/auth.js"></script>
</body>
</html>
